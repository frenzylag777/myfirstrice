general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(8ea2cdff)
    col.inactive_border = rgba(1a1b26ff)
    layout = dwindle
}

decoration {
    rounding = 6

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

bezier = fastOut, 0, 0, 0, 1
bezier = fluid, 0.1, 0.9, 0.2, 1

animations {
    enabled = yes

    animation = windows, 1, 4, fluid, slide
    animation = windowsOut, 1, 3, fastOut, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 3, fluid, slidefade 20%
}

exec = awww img ~/Pictures/wall1.jpg
